name: Node CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Verify Node
        run: node --version

      - name: Verify NPM
        run: npm --version

      - name: Project Structure
        run: ls -la

      - name: Build Docker Image
        run: docker build -t nodejs-cicd-demo:v1 .
